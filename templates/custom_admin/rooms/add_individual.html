{% extends 'custom_admin/base.html' %}

{% block title %}Add Individual Room - Paradise Heaven Admin{% endblock %}

{% block page_title %}Add Individual Room{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Add Individual Room</h3>
        <a href="{% url 'manage_individual_rooms' %}" class="btn btn-secondary btn-sm">
            <i class="fas fa-arrow-left"></i> Back to Rooms
        </a>
    </div>
    
    <form method="POST" style="max-width: 600px;">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="room_type">Room Type *</label>
            <select id="room_type" name="room_type" class="form-control" required>
                <option value="">Select Room Type</option>
                {% for room in room_types %}
                <option value="{{ room.id }}">{{ room.room_name }} - ₹{{ room.room_price }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="room_number">Room Number *</label>
            <input type="number" id="room_number" name="room_number" class="form-control" placeholder="e.g., 101" required>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_available" checked> Available for Booking
            </label>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Save Room
            </button>
            <a href="{% url 'manage_individual_rooms' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
