{% extends 'custom_admin/base.html' %}

{% block title %}Add Room - Paradise Heaven Admin{% endblock %}

{% block page_title %}Add New Room Type{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Add New Room Type</h3>
        <a href="{% url 'manage_rooms' %}" class="btn btn-secondary btn-sm">
            <i class="fas fa-arrow-left"></i> Back to Rooms
        </a>
    </div>
    
    <form method="POST" enctype="multipart/form-data" style="max-width: 600px;">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="room_name">Room Name *</label>
            <input type="text" id="room_name" name="room_name" class="form-control" placeholder="e.g., Deluxe Double Room" required>
        </div>
        
        <div class="form-group">
            <label for="room_des">Description *</label>
            <textarea id="room_des" name="room_des" class="form-control" rows="4" placeholder="Describe the room..." required></textarea>
        </div>
        
        <div class="form-group">
            <label for="room_price">Price per Night (₹) *</label>
            <input type="number" id="room_price" name="room_price" class="form-control" placeholder="e.g., 5000" required>
        </div>
        
        <div class="form-group">
            <label for="room_facilities">Facilities</label>
            <input type="text" id="room_facilities" name="room_facilities" class="form-control" placeholder="WiFi, TV, AC, etc.">
        </div>
        
        <div class="form-group">
            <label for="number_of_rooms">Number of Rooms *</label>
            <input type="number" id="number_of_rooms" name="number_of_rooms" class="form-control" placeholder="e.g., 5" value="1" min="1" required>
        </div>
        
        <div class="form-group">
            <label for="room_image">Room Image</label>
            <input type="file" id="room_image" name="room_image" class="form-control" accept="image/*">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Save Room
            </button>
            <a href="{% url 'manage_rooms' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
