<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Paradise Heaven</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* Admin Login Specific Styles */
        .admin-login {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--primary-color);
        }

        .admin-login__form {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        .admin-login__form h2 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
            font-weight: 800;
            font-family: var(--header-font);
            color: var(--text-dark);
            text-align: center;
        }

        .admin-login__form input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid var(--text-light);
            border-radius: 5px;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
        }

        .admin-login__form button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--secondary-color);
            color: var(--white);
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .admin-login__form button:hover {
            background-color: #e69500;
        }
    </style>
</head>
<body>
    <div class="admin-login">
        <div class="admin-login__form">
            <h2>Admin Login</h2>
            <form id="adminLoginForm" method="POST" action="php/admin_login.php">
                <input type="text" id="username" placeholder="Username" name="username" required>
                <input type="password" id="password" placeholder="Password" name="password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
