{% extends 'master.html' %}
{% load static %}
{% block content %}

<head>
    <style>
        .review-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .review-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .room-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .room-info h3 {
            margin: 0;
            color: #333;
        }
        
        .room-info p {
            margin: 5px 0 0;
            color: #666;
        }
        
        .rating-section {
            margin-bottom: 25px;
        }
        
        .rating-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        
        .star-rating {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 10px;
        }
        
        .star-rating input {
            display: none;
        }
        
        .star-rating label {
            font-size: 40px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #ffc107;
        }
        
        .review-form-group {
            margin-bottom: 20px;
        }
        
        .review-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .review-form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            min-height: 120px;
            resize: vertical;
        }
        
        .review-form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<div class="review-container">
    <div class="review-header">
        <h2>Write a Review</h2>
        <p>Share your experience at {{ room.room_name }}</p>
    </div>
    
    <div class="room-info">
        <h3>{{ room.room_name }}</h3>
        <p>₹{{ room.room_price }}/night</p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="rating-section">
            <label>Your Rating</label>
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5">
                <label for="star5" title="5 stars">★</label>
                <input type="radio" id="star4" name="rating" value="4">
                <label for="star4" title="4 stars">★</label>
                <input type="radio" id="star3" name="rating" value="3">
                <label for="star3" title="3 stars">★</label>
                <input type="radio" id="star2" name="rating" value="2">
                <label for="star2" title="2 stars">★</label>
                <input type="radio" id="star1" name="rating" value="1">
                <label for="star1" title="1 star">★</label>
            </div>
        
        <div class="review-form-group">
            <label for="review_text">Your Review (Optional)</label>
            <textarea id="review_text" name="review_text" placeholder="Tell us about your experience..."></textarea>
        </div>
        
        <button type="submit" class="btn-submit">Submit Review</button>
    </form>
</div>

{% endblock %}
